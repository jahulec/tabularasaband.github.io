name: Calendar Sync

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-shows:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOOGLE_CALENDAR_ICS_URL: ${{ secrets.GOOGLE_CALENDAR_ICS_URL || vars.GOOGLE_CALENDAR_ICS_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync shows from calendar
        run: node scripts/sync-shows-from-calendar.mjs

      - name: Lightweight checks
        run: |
          npm run check:encoding
          npm run test:generator

      - name: Commit and push updates
        run: |
          if git diff --quiet; then
            echo "No show updates to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/shows.json shows.html shows-en.html index.html index-en.html
          git commit -m "Sync shows from calendar"
          git push origin HEAD:main
